# 评分 Rubric - 数学建模论文质量评价标准
# v2.0: 添加竞赛 100 分制映射

rubric:
  name: "Mate-Math-v3 论文质量评分表"
  version: "3.0"

# ── 内部 7 维度（用于门禁自动评分，输出 0.0-1.0）──────────────
dimensions:
  - id: problem_understanding
    name: "题意理解"
    weight: 0.10
    criteria:
      - "问题拆解准确，不遗漏子问题"
      - "评价指标定义与题目一致"
      - "约束条件完整识别"
      - "数据边界和适用范围明确"

  - id: data_processing
    name: "数据处理"
    weight: 0.15
    criteria:
      - "数据清洗合理，有依据"
      - "单位和表头解释清楚"
      - "缺失值和异常值处理有说明"
      - "数据画像完整（分布、趋势、相关性）"

  - id: model_rationality
    name: "模型合理性"
    weight: 0.25
    criteria:
      - "模型有数学/物理依据"
      - "假设明确且合理"
      - "推导过程清晰完整"
      - "模型可解释"
      - "备选模型有对比说明"

  - id: solving_reproducibility
    name: "求解与复现"
    weight: 0.20
    criteria:
      - "代码可运行"
      - "结果可复现（同数据同结果）"
      - "误差计算正确（MRE/RMSE/MAE 等）"
      - "关键数值可追溯到代码输出"

  - id: figure_table
    name: "图表表达"
    weight: 0.10
    criteria:
      - "图表清晰、有标题和标注"
      - "图表能支撑结论"
      - "表格格式规范"
      - "图表与正文描述一致"

  - id: paper_writing
    name: "论文写作"
    weight: 0.15
    criteria:
      - "结构完整（重述、假设、符号、正文、评价、参考文献）"
      - "摘要包含问题、方法、结果、关键词"
      - "语言规范、无口语化表达"
      - "公式编号和图表编号连续"

  - id: adversarial_revision
    name: "对抗修订"
    weight: 0.05
    criteria:
      - "明确回应审稿质疑"
      - "高优先级问题全部关闭"
      - "修订有据可查"

# ── 竞赛 100 分制映射 ─────────────────────────────────────────
# 将内部 7 维度映射到竞赛官方评分维度，输出 0-100 分
# 每个映射项: dim_id → points（该维度在该竞赛中占的分数）
# 所有维度得分相加 = 100 分
competition_mapping:
  CUMCM:
    name: "CUMCM 国赛（100 分制）"
    source: "scoring-criteria-cumcm.md（2023-2025 评阅要点综合）"
    official_dimensions:
      - name: "模型质量"
        points: 55
        description: "模型的合理性、创新性、深度；数学推导是否严谨"
        sub:
          - "模型构建 30 分 — 创新性 + 推导严谨性 + 假设合理性"
          - "模型选择与比较 15 分 — 备选方案说明 + 消融实验"
          - "模型创新性 10 分（加分项）— 新模型/有意义改进"
      - name: "问题解决"
        points: 25
        description: "是否准确理解题意；是否逐题回答；结论是否清晰"
      - name: "论文规范"
        points: 12
        description: "摘要质量、格式规范、语言表达、图表质量"
        sub:
          - "摘要 5 分 — 问题+方法+结果+结论四要素，300-500 字"
          - "格式 3 分 — A4、页边距 2.5cm、字体统一、页码"
          - "语言 3 分 — 专业简洁，无口语化"
          - "图表 4 分 — 标题+正文解读，编号连续，>=300DPI"
      - name: "验证与检验"
        points: 8
        description: "结果验证、灵敏度分析、鲁棒性检验"
    # 内部维度 → CUMCM 100 分制的分数映射
    # 每个内部维度的分数 = dim_score(0-1) × allocation，求和得总分
    dim_allocations:
      problem_understanding: 15      # → 问题解决 15 + 论文规范（部分）
      data_processing: 10            # → 模型质量 10
      model_rationality: 35          # → 模型质量 35
      solving_reproducibility: 15    # → 模型质量 5 + 问题解决 10
      figure_table: 8                # → 论文规范 8
      paper_writing: 12              # → 论文规范 4 + 问题解决（部分）→ 论文规范 12
      adversarial_revision: 5        # → 验证与检验 5
    # 各维度在官方维度中的归属
    dimension_ownership:
      model_quality:                 # 模型质量 55 分
        - [model_rationality, 35]
        - [data_processing, 10]
        - [solving_reproducibility, 5]
        - [problem_understanding, 5]  # 创新加分部分
      problem_solving:               # 问题解决 25 分
        - [problem_understanding, 10]
        - [solving_reproducibility, 10]
        - [adversarial_revision, 5]
      paper_standards:               # 论文规范 12 分
        - [paper_writing, 12]
      verification:                  # 验证与检验 8 分
        - [figure_table, 8]
    # 分数段判定
    award_thresholds:
      first_prize: 85                # 一等奖参考线（Top 5-10%）
      second_prize: 70               # 二等奖参考线（Top 10-25%）
      third_prize: 55                # 三等奖参考线（Top 25-50%）
    # 扣分重灾区
    deduction_alerts:
      - pattern: "摘要缺失关键信息"
        deduction: "-5~10"
      - pattern: "图表无正文解读"
        deduction: "-5~8"
      - pattern: "结论与正文矛盾"
        deduction: "-10~15"
      - pattern: "格式严重不规范"
        deduction: "-5~10"
      - pattern: "无灵敏度/鲁棒性分析"
        deduction: "-5~8"
      - pattern: "编造数据/参考文献"
        deduction: "-15~20（取消评奖资格）"

  51MCM:
    name: "51MCM 五一赛（100 分制）"
    source: "51MCM 评阅标准（综合历年）"
    official_dimensions:
      - name: "模型质量"
        points: 50
        description: "模型构建、数学推导、方法创新"
      - name: "问题解决"
        points: 25
        description: "题意理解、逐题回答、结论清晰"
      - name: "论文规范"
        points: 15
        description: "摘要、格式、图表、语言"
      - name: "验证与检验"
        points: 10
        description: "灵敏度分析、鲁棒性、基线对比"
    dim_allocations:
      problem_understanding: 15
      data_processing: 10
      model_rationality: 30
      solving_reproducibility: 15
      figure_table: 10
      paper_writing: 15
      adversarial_revision: 5
    award_thresholds:
      first_prize: 82
      second_prize: 68
      third_prize: 52

  MCM_ICM:
    name: "MCM/ICM 美赛（100 分制）"
    source: "MCM/ICM 评阅标准（综合历年）"
    official_dimensions:
      - name: "Modeling & Solution"
        points: 50
        description: "模型构建、数学推导、算法实现"
      - name: "Problem Analysis"
        points: 25
        description: "问题理解、假设合理性、结论清晰"
      - name: "Paper Quality"
        points: 15
        description: "摘要、格式、图表、语言（英文）"
      - name: "Sensitivity & Robustness"
        points: 10
        description: "灵敏度分析、鲁棒性检验、基线对比"
    dim_allocations:
      problem_understanding: 15
      data_processing: 10
      model_rationality: 30
      solving_reproducibility: 15
      figure_table: 10
      paper_writing: 15
      adversarial_revision: 5
    award_thresholds:
      first_prize: 82
      second_prize: 68
      third_prize: 52

# ── 门禁通过阈值（内部 0.0-1.0 分制）──────────────────────────
gates:
  G1_problem_parsed:
    min_score: 0.6
    mandatory_checks: ["问题拆解完整", "评价指标明确"]

  G1.5_data_quality:
    min_score: 0.7
    mandatory_checks: ["无未说明缺失值", "单位统一"]

  G2_method_validated:
    min_score: 0.7
    mandatory_checks: ["至少两个候选模型", "选择有理由"]

  G3_code_reviewed:
    min_score: 0.8
    mandatory_checks: ["代码可运行", "结果可复现"]

  G5_paper_section_ready:
    min_score: 0.7
    mandatory_checks: ["每个问题有模型+求解+结果", "摘要有数值结论"]

  G5.5_adversarial_review:
    min_score: 0.8
    mandatory_checks: ["P0问题为零", "P1问题全部关闭"]

  G1.5_metric_guardian:
    min_score: 0.7
    mandatory_checks: ["指标有数学定义", "代码实现匹配"]

  G2.5_experiment_race:
    min_score: 0.7
    mandatory_checks: ["排行榜存在", "主模型已确认"]

  G3_math_sandbox:
    min_score: 0.8
    mandatory_checks: ["代码安全通过", "数值有限"]

  G4_results_frozen:
    min_score: 0.8
    mandatory_checks: ["frozen_numbers.json 存在", "未过期"]

  G4.5_evidence_chain:
    min_score: 0.75
    mandatory_checks: ["证据链完整", "论文代码一致"]

  abstract_quality_gate:
    min_score: 0.7
    mandatory_checks: ["包含模型名", ">=2个量化结果"]

  abstract_body_consistency:
    min_score: 0.8
    mandatory_checks: ["摘要数字与正文一致", "与冻结数据一致"]

  cross_subquestion_consistency:
    min_score: 0.8
    mandatory_checks: ["变量一致", "单位一致", "假设一致"]

  per_subquestion_verification:
    min_score: 0.7
    mandatory_checks: ["灵敏度分析存在", "鲁棒性检查存在"]

  G6_audit_layer_passed:
    min_score: 0.85
    mandatory_checks: ["论文数值与代码一致", "图表可复现"]
