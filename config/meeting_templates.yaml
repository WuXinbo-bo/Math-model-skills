# 会议模板定义 (v3.0)
# 角色名对齐 SKILL.md 功能角色注册表

meetings:
  M001_kickoff:
    name: "题意共识会"
    type: "consensus"
    stage: "S1_problem_analysis"
    stage_name: "题目解析与题意共识"
    participants: ["planner", "analyst", "reviewer"]
    judge: "reviewer"
    objective: "明确题目要求、确认数据可用性、确定初始建模路线"
    process:
      - step: 1
        actor: "planner"
        action: "独立解析题目，输出 project_brief.md 草案"
      - step: 2
        actor: "analyst"
        action: "补充数据可用性分析"
      - step: 3
        actor: "reviewer"
        action: "指出可能误读和风险点"
      - step: 4
        actor: "planner"
        action: "合并为唯一题意版本，写入正式文件"
    outputs: ["meeting_001_kickoff.md", "project_brief.md", "task_breakdown.md"]

  M002_model_debate:
    name: "模型路线辩论会"
    type: "debate"
    stage: "S3_model_selection"
    stage_name: "模型候选与路线辩论"
    participants: ["proposer", "analyst", "critic", "reviewer"]
    judge: "reviewer"
    objective: "并列比较候选模型，通过辩论和赛马确定主模型"
    process:
      - step: 1
        actor: "proposer"
        action: "Round 0: 独立提交模型路线（精度视角 + 稳健视角），不互相查看"
      - step: 2
        actor: "critic"
        action: "Round 1: 提出反例和质疑，攻击漏洞"
      - step: 3
        actor: "proposer"
        action: "Round 2: 回应质疑，修正方案"
      - step: 4
        actor: "reviewer"
        action: "按评分表裁决主模型、备选模型和返工项"
      - step: 5
        actor: "planner"
        action: "记录决策到 decision_log"
    scoring_dimensions:
      - name: "题意匹配"
        weight: 0.20
      - name: "数据适配"
        weight: 0.20
      - name: "数学合理性"
        weight: 0.20
      - name: "可复现性"
        weight: 0.15
      - name: "泛化能力"
        weight: 0.10
      - name: "论文表达价值"
        weight: 0.10
      - name: "风险可控性"
        weight: 0.05
    outputs: ["meeting_002_model_debate.md", "model_candidates.md", "model_selection_report.md", "debate_summary.md"]
    structured_summary:
      file: "debate_summary.md"
      sections:
        - "辩论要点摘要（每方核心论点）"
        - "模型对比矩阵（所有候选模型的 7 维评分表）"
        - "被否决模型的否决理由"
        - "选中模型的关键优势和潜在风险"
        - "对后续阶段（S4-S6）的影响"

  M003_experiment_review:
    name: "实验复盘会"
    type: "review"
    stage: "S8_paper_drafting"
    stage_name: "论文初稿撰写"
    participants: ["builder", "analyst", "proposer", "critic"]
    judge: "reviewer"
    objective: "检查数据清洗、拟合、预测、图表是否正确"
    process:
      - step: 1
        actor: "builder"
        action: "展示实验结果、误差表、图表"
      - step: 2
        actor: "critic"
        action: "检查过拟合、外推风险、异常点影响"
      - step: 3
        actor: "analyst"
        action: "确认数据口径一致性"
      - step: 4
        actor: "reviewer"
        action: "决定是否需要补充实验"
    outputs: ["meeting_003_experiment_review.md", "experiment_review_summary.md"]
    structured_summary:
      file: "experiment_review_summary.md"
      sections:
        - "实验结果总结（每个子问题的关键结果）"
        - "发现的问题清单（数据/模型/代码问题）"
        - "需要补充的实验"
        - "对论文撰写的影响和指导"

  M004_paper_redteam:
    name: "论文红队审稿会"
    type: "adversarial"
    stage: "S9_adversarial_review"
    stage_name: "对抗审稿与修订"
    participants: ["writer", "critic", "reviewer", "planner"]
    judge: "planner"
    objective: "找逻辑、数值、表达、格式硬伤"
    process:
      - step: 1
        actor: "writer"
        action: "提交论文初稿"
      - step: 2
        actor: "critic"
        action: "从数学、领域、评委三视角进行红队攻击"
      - step: 3
        actor: "writer"
        action: "逐条回应并生成 revision_plan.md"
      - step: 4
        actor: "planner"
        action: "确认所有高优先级问题关闭"
    outputs: ["meeting_004_paper_redteam.md", "adversarial_review.md", "revision_plan.md", "revision_verification.md", "redteam_summary.md"]
    structured_summary:
      file: "revision_verification.md"
      sections:
        - "P0/P1 修复验证（每个问题是否真正修复）"
        - "修订后论文二次审查（是否引入新问题）"
        - "残留风险评估"
        - "修订前后对比（关键改动点）"
    championship_extra_rounds: 3
    championship_round_perspectives:
      - "第 1 轮: 数学/建模视角（公式推导、假设合理性、模型选择）"
      - "第 2 轮: 领域/应用视角（问题背景、实际意义、结论可信度）"
      - "第 3 轮: 评委/表达视角（论文结构、图表质量、写作规范）"
