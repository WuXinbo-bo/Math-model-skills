<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Meta-model-agent</title>
  <desc id="desc">Engineering workflow for reproducible mathematical modeling research and competition papers.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.52" stop-color="#102a43"/>
      <stop offset="1" stop-color="#173f5f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#36c5f0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#36c5f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>
  <g opacity="0.12" stroke="#8bdcf5" fill="none">
    <circle cx="1020" cy="95" r="170"/>
    <circle cx="1020" cy="95" r="115"/>
    <path d="M760 310C870 205 965 270 1200 115"/>
    <path d="M700 345C860 160 1035 300 1200 190"/>
  </g>
  <rect x="58" y="58" width="244" height="244" rx="44" fill="#fff" filter="url(#shadow)"/>
  <image href="logo.svg" x="76" y="76" width="208" height="208" preserveAspectRatio="xMidYMid meet"/>
  <text x="350" y="145" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="750" letter-spacing="-1.5">Meta-model-agent</text>
  <text x="353" y="202" fill="#8bdcf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="1.2">MATHEMATICAL MODELING RESEARCH WORKFLOW</text>
  <text x="353" y="254" fill="#d7e7f5" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="25">从问题理解、真实计算到证据可视化、冠军审稿与提交验收</text>
  <g transform="translate(353 284)">
    <rect width="118" height="38" rx="19" fill="#0e7490"/>
    <text x="59" y="26" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="17" font-weight="650">Reproducible</text>
    <rect x="132" width="112" height="38" rx="19" fill="#2563a8"/>
    <text x="188" y="26" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="17" font-weight="650">Evidence-led</text>
    <rect x="258" width="124" height="38" rx="19" fill="#6d4cc3"/>
    <text x="320" y="26" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="17" font-weight="650">Competition-ready</text>
  </g>
